[plugin]

name="NGIN#9 SDK"
description="SDK-side addon for content development and management.

In the NGIN#9 game client, access most development operations under Workshop → SDK to create .cfg files, build spawn tables, and manage other content workflows. The main client handles most things such as spawn tables and configuration file generation because it has access to the classes necessary to implement them. Here, you should only be expected to create mods without need for direct manipulation of code or configs. Note: GD script is not allowed in client-side plugins unless the user explicitly allows it. This is for safety. 
This addon primarily handles export-related tasks. See documentation for details."
author="Leo Blanchette"
version=""
script="ngin_9_sdk.gd"
